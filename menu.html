<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Full menu for Vamshi's Tasteuraa — ice creams, shakes, fries, burgers, momos and more. Order for pickup or delivery.">

    <title>Menu - Vamshi's Tasteuraa</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar">

    <div class="logo">

        <img src="images/logo.png" alt="Logo">

        <div>

            <h2>Vamshi's Tasteuraa</h2>

            <p>Our Full Menu</p>

        </div>

    </div>

    <button class="cart-btn" id="cartButton">

        🛒 Cart

        <span id="cart-count">0</span>

    </button>

</nav>

<header class="menu-header">

    <h1>🍦 Our Menu</h1>

    <p>Fresh • Natural • Homemade</p>

</header>

<!-- ================= SEARCH ================= -->

<section class="search-section">

    <input
        type="text"
        id="search"
        placeholder="🔍 Search Ice Creams, Shakes, Fries, Burgers...">

</section>

<!-- ================= CATEGORIES ================= -->

<section class="category-section">

    <div id="categories">

        <button class="category-btn active">

            All

        </button>

    </div>

</section>

<!-- ================= SORT ================= -->

<section class="sort-section">

    <label for="sort">Sort By:</label>

    <select id="sort">

        <option value="default">Recommended</option>

        <option value="low">Price : Low to High</option>

        <option value="high">Price : High to Low</option>

        <option value="name">Name : A - Z</option>

    </select>

</section>

<!-- ================= PRODUCTS (accordion by category) ================= -->

<section class="products menu-container">

    <div id="category-products" class="products-accordion">

        <!-- Products load dynamically -->

    </div>

</section>

<!-- ================= FLOATING CART ================= -->

<button
    class="floating-cart"
    id="floating-cart">

    🛒
    <span class="floating-badge" id="floating-cart-count">0</span>

</button>

<!-- ================= OVERLAY ================= -->

<div id="overlay"></div>

<!-- ================= CART PANEL ================= -->

<div id="cart-panel">

    <div class="cart-header">

        <h2>🛒 Your Cart</h2>

        <button id="close-cart">&times;</button>

    </div>

    <div id="cart-items">

        <!-- Cart Items -->

    </div>

    <hr>

    <h3>

        Total

        <span id="cart-total">

            ₹0

        </span>

    </h3>

   <button id="checkout-btn">
    📲 Review & Send Order
</button>

</div>

<!-- ================= CHECKOUT MODAL ================= -->

<div id="checkout-modal" class="checkout-modal">

    <div class="checkout-box">

        <div class="checkout-header">

            <h2>Customer Details</h2>

            <button id="close-checkout">&times;</button>

        </div>

        <form id="checkout-form">

            <input
                type="text"
                id="customer-name"
                placeholder="Your Name"
                required>

            <input
                type="tel"
                id="customer-phone"
                placeholder="Mobile Number"
                required>

            <textarea
                id="customer-address"
                placeholder="Delivery Address"
                rows="3"></textarea>

            <input
                type="text"
                id="customer-landmark"
                placeholder="Landmark">

            <select id="delivery-type">

                <option value="Pickup">Pickup</option>

                <option value="Home Delivery">Home Delivery</option>

            </select>

            <textarea
                id="special-note"
                placeholder="Special Instructions (Optional)"
                rows="3"></textarea>

            <button type="submit" id="send-whatsapp">

                📲 Send Order on WhatsApp

            </button>

        </form>

    </div>

</div>

<!-- ================= FOOTER ================= -->

<footer class="footer">

    <h3>🍦 Vamshi's Tasteuraa</h3>

    <p>Pure • Fresh • Homemade</p>

    <p>📞 7337200322</p>

    <p>

        Available on

        Swiggy • Zomato

    </p>

</footer>

<script src="js/cart.js"></script>

<script src="js/app.js"></script>

</body>
</html>
